<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | GreenRoom</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="manifest" href="/static/manifest_user.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .profile-header { background: white; padding: 3rem 1.5rem; text-align: center; border-radius: 0 0 32px 32px; box-shadow: var(--shadow-soft); margin-bottom: 2rem; }
        .avatar { width: 80px; height: 80px; background: #f0fdf4; color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 2rem; font-weight: 700; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 1.5rem; }
        .stat-box { background: #f9fafb; padding: 1rem; border-radius: 16px; text-align: center; }
        .stat-val { font-size: 1.25rem; font-weight: 700; color: var(--text-dark); }
        .stat-lbl { font-size: 0.75rem; color: var(--text-gray); }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">
            <i data-lucide="home"></i>
            <span>Green<span>Room</span></span>
        </a>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div class="notification-wrapper" onclick="toggleNotifications()">
                <i data-lucide="bell" style="cursor: pointer; color: var(--text-gray);"></i>
                <div class="unread-badge" id="notif-dot"></div>
            </div>
            <button onclick="logout()" style="background:none; border:none; color: var(--text-gray); cursor: pointer;"><i data-lucide="log-out"></i></button>
        </div>
    </header>

    <div class="notification-panel" id="notif-panel">
        <div class="notif-header">
            <h3 style="font-size: 1rem;">Notifications</h3>
            <button onclick="toggleNotifications()" style="background:none; border:none; cursor:pointer;"><i data-lucide="x" size="18"></i></button>
        </div>
        <div class="notif-list" id="notif-list"></div>
    </div>

    <div class="page-container" id="profile-page" style="display: none; max-width: 800px; margin: 0 auto; padding: 1rem;">
        <div class="profile-header">
            <div class="avatar" id="user-initial">U</div>
            <h2 id="display-name">...</h2>
            <p id="display-email" style="color: var(--text-gray); font-size: 0.9rem;">...</p>
            <p id="display-phone" style="font-weight: 600; color: var(--primary); margin-top: 5px;"></p>
            
            <div class="stats-row">
                <div class="stat-box">
                    <div class="stat-val" id="count-listings">0</div>
                    <div class="stat-lbl">My Listings</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="user-status">Verified</div>
                    <div class="stat-lbl">Account Status</div>
                </div>
            </div>
        </div>

        <!-- Profile Completion Form -->
        <div id="profile-form-section" style="display: none; background: white; padding: 2rem; border-radius: 24px; box-shadow: var(--shadow-soft); margin-bottom: 2rem; border: 2px solid var(--primary-light);">
            <div style="text-align: center; margin-bottom: 1.5rem;">
                <i data-lucide="user-plus" style="color: var(--primary);"></i>
                <h3 style="margin-top: 10px;">Complete Your Profile</h3>
                <p style="font-size: 0.85rem; color: var(--text-gray);">This info will show on your property cards for direct contact.</p>
            </div>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="setup-name" placeholder="Enter your full name">
            </div>
            <div class="input-group">
                <label>Phone Number (WhatsApp preferred)</label>
                <input type="tel" id="setup-phone" placeholder="e.g. +91 98765 43210">
            </div>
            <button class="btn-primary" onclick="saveProfile()" id="save-profile-btn">Save Profile Details</button>
        </div>

        <div id="my-listings-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3>My Property Listings</h3>
                <a href="/list-room" class="btn-primary" style="padding: 8px 16px; width: auto; font-size: 0.8rem; text-decoration: none;">+ Add New</a>
            </div>
            <div class="listing-grid" id="my-listings">
                <!-- User listings -->
            </div>
        </div>
    </div>

    <!-- Reusing Auth UI from list_room if needed -->
    <div class="page-container" id="auth-section" style="display: none; max-width: 400px; margin: 5rem auto; text-align: center;">
         <i data-lucide="user-plus" size="48" style="color: var(--primary); margin-bottom: 1rem;"></i>
         <h2>Sign In</h2>
         <p style="color: var(--text-gray); margin-bottom: 2rem;">Access your dashboard and manage listings.</p>
         <a href="/list-room" class="btn-primary" style="text-decoration: none; display: block;">Login via OTP</a>
    </div>

    <nav class="bottom-nav">
        <a href="/" class="nav-item">
            <i data-lucide="search"></i>
            <span>Explore</span>
        </a>
        <a href="/list-room" class="nav-item">
            <i data-lucide="plus-circle" style="color: var(--primary);"></i>
            <span>Post Room</span>
        </a>
        <a href="/profile" class="nav-item active">
            <i data-lucide="user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <script>
        lucide.createIcons();

        async function initProfile() {
            const resp = await fetch('/api/user/me');
            const data = await resp.json();
            if(!data.logged_in) {
                document.getElementById('auth-section').style.display = 'block';
                return;
            }

            document.getElementById('profile-page').style.display = 'block';
            document.getElementById('display-email').innerText = data.email;
            document.getElementById('user-initial').innerText = data.email[0].toUpperCase();
            
            if (!data.name || !data.phone) {
                document.getElementById('profile-form-section').style.display = 'block';
                document.getElementById('display-name').innerText = "New User";
            } else {
                document.getElementById('display-name').innerText = data.name;
                document.getElementById('display-phone').innerText = `📞 ${data.phone}`;
                document.getElementById('profile-form-section').style.display = 'none';
            }
            
            fetchUserListings();
        }

        async function saveProfile() {
            const name = document.getElementById('setup-name').value;
            const phone = document.getElementById('setup-phone').value;
            const btn = document.getElementById('save-profile-btn');

            if (!name || !phone) {
                alert("Please fill all details");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Saving...";

            const resp = await fetch('/api/user/profile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone })
            });

            const res = await resp.json();
            if (res.success) {
                initProfile(); // Refresh
            } else {
                alert("Error: " + res.message);
                btn.disabled = false;
                btn.innerText = "Save Profile Details";
            }
        }

        async function fetchUserListings() {
            const resp = await fetch('/api/user/listings');
            const data = await resp.json();
            const grid = document.getElementById('my-listings');
            document.getElementById('count-listings').innerText = data.length;

            if (data.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: #999;">You haven\'t posted any rooms yet.</div>';
                return;
            }

            grid.innerHTML = data.map(room => {
                const firstImg = room.images && room.images.length > 0 ? room.images[0] : '';
                const imgUrl = firstImg.startsWith('http') ? firstImg : (firstImg ? `/uploads/${firstImg}` : 'https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&q=80&w=400');
                
                return `
                    <div class="property-card fade-up">
                        <div class="card-img-container">
                            <img src="${imgUrl}" alt="${room.title}" onerror="this.src='https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&q=80&w=400'">
                            <div class="status-overlay" style="position: absolute; top: 10px; right: 10px;">
                                <span class="status-badge ${room.is_approved ? 'status-approved' : 'status-pending'}">
                                    ${room.is_approved ? 'Live' : 'Pending Review'}
                                </span>
                            </div>
                        </div>
                        <div class="card-content">
                            <h4 class="card-title" style="font-size: 0.95rem;">${room.title}</h4>
                            <div style="font-size: 0.8rem; color: var(--text-gray); margin-top: 5px;">
                                ₹${room.price.toLocaleString()} / month
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        async function logout() {
            await fetch('/api/user/logout');
            window.location.reload();
        }

        initProfile();

        // Notification JS (reused)
        async function fetchNotifications() {
            const resp = await fetch('/api/notifications');
            const data = await resp.json();
            const list = document.getElementById('notif-list');
            const dot = document.getElementById('notif-dot');
            if (data.length === 0) {
                list.innerHTML = '<div class="no-notifs">No notifications yet.</div>';
                dot.style.display = 'none';
                return;
            }
            const unread = data.some(n => !n.is_read);
            dot.style.display = unread ? 'block' : 'none';
            list.innerHTML = data.map(n => `
                <div class="notif-item ${n.is_read ? '' : 'unread'}">
                    <div class="notif-title">${n.title}</div>
                    <div class="notif-desc">${n.message}</div>
                    <div class="notif-time">${new Date(n.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                </div>
            `).join('');
        }
        function toggleNotifications() {
            const panel = document.getElementById('notif-panel');
            const isVisible = panel.style.display === 'block';
            panel.style.display = isVisible ? 'none' : 'block';
            if (isVisible) {
                fetch('/api/notifications/read', { method: 'POST' });
                document.getElementById('notif-dot').style.display = 'none';
            } else {
                fetchNotifications();
            }
        }
        fetchNotifications();
    </script>
</body>
</html>
