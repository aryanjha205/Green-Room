<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | GreenRoom</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="manifest" href="/static/manifest_admin.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .admin-nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; background: white; border-bottom: 1px solid #eee; }
        .dashboard-container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 20px; box-shadow: var(--shadow-soft); border-left: 4px solid var(--primary); }
        .stat-card h3 { font-size: 0.85rem; color: var(--text-gray); margin-bottom: 8px; }
        .stat-card div { font-size: 1.8rem; font-weight: 700; color: var(--text-dark); }
        .btn-add { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.3s; }
        .btn-add:hover { background: var(--primary-dark); }
        .listing-table { background: white; border-radius: 20px; overflow: hidden; box-shadow: var(--shadow-soft); margin-top: 2rem; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f9fafb; text-align: left; padding: 15px 20px; font-size: 0.85rem; color: var(--text-gray); text-transform: uppercase; }
        td { padding: 15px 20px; border-top: 1px solid #f3f4f6; font-size: 0.95rem; }
        .actions { display: flex; gap: 10px; }
        .btn-icon { width: 32px; height: 32px; border-radius: 8px; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-delete { color: #f52d2d; border-color: #ffcccc; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 600px; border-radius: 24px; padding: 40px; position: relative; max-height: 90vh; overflow-y: auto; }
        .close-modal { position: absolute; right: 20px; top: 20px; cursor: pointer; }
        .image-preview { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .preview-box { width: 80px; height: 80px; border-radius: 10px; overflow: hidden; background: #eee; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <header class="admin-nav">
        <a href="/" class="logo">
            <i data-lucide="home"></i>
            <span>Green<span>Room Admin</span></span>
        </a>
        <div style="display: flex; gap: 15px; align-items: center;">
            <a href="/api/logout" style="text-decoration: none; color: var(--text-gray); display: flex; align-items: center; gap: 5px;">
                <i data-lucide="log-out"></i> Logout
            </a>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Listings</h3>
                <div id="count-total">...</div>
            </div>
            <div class="stat-card">
                <h3>Active Regions</h3>
                <div id="count-regions">...</div>
            </div>
            <div class="stat-card">
                <h3>Pending Approval</h3>
                <div id="count-pending" style="color: #f59e0b;">...</div>
            </div>
            <div class="stat-card">
                <h3>Views this Month</h3>
                <div>1,248</div>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 class="section-title">Property Listings</h2>
            <button class="btn-add" onclick="openModal()">
                <i data-lucide="plus"></i> Add New Flat
            </button>
        </div>

        <div class="listing-table">
            <table>
                <thead>
                    <tr>
                        <th>Property</th>
                        <th>Price & Deposit</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="listing-body">
                    <!-- Table rows -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add Flat Modal -->
    <div class="modal" id="flat-modal">
        <div class="modal-content">
            <i data-lucide="x" class="close-modal" onclick="closeModal()"></i>
            <h2>Add New Property</h2>
            <p style="color: var(--text-gray); margin-bottom: 25px;">Enter details for the new listing</p>
            
            <form id="flat-form">
                <div class="input-group">
                    <label>Property Title</label>
                    <input type="text" name="title" placeholder="e.g. Spacious 2BHK near Metro" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label>Monthly Rent (₹)</label>
                        <input type="number" name="price" placeholder="15000" required>
                    </div>
                    <div class="input-group">
                        <label>Deposit (₹)</label>
                        <input type="number" name="deposit" placeholder="30000" required>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label>Latitude</label>
                        <input type="text" name="lat" placeholder="19.0760" required>
                    </div>
                    <div class="input-group">
                        <label>Longitude</label>
                        <input type="text" name="lon" placeholder="72.8777" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Description</label>
                    <textarea name="description" rows="3" placeholder="Tell about the house, rules, etc."></textarea>
                </div>
                <div class="input-group">
                    <label>Amenities (Comma separated)</label>
                    <input type="text" name="amenities" placeholder="Wifi, Gym, Parking, Elevator">
                </div>
                <div class="input-group">
                    <label>Images</label>
                    <input type="file" name="images" id="image-input" multiple accept="image/*" onchange="previewImages()">
                    <div class="image-preview" id="preview-grid"></div>
                </div>
                
                <button type="submit" class="btn-primary" id="save-btn">
                    Save Property Listing
                </button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        async function fetchListings() {
            const resp = await fetch('/api/listings');
            const data = await resp.json();
            const body = document.getElementById('listing-body');
            body.innerHTML = '';
            
            document.getElementById('count-total').innerText = data.length;
            document.getElementById('count-pending').innerText = data.filter(l => !l.is_approved).length;
            document.getElementById('count-regions').innerText = new Set(data.map(l => l.lat.toFixed(1))).size;

            data.forEach(l => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <img src="/uploads/${l.images[0] || 'placeholder.jpg'}" style="width: 40px; height: 40px; border-radius: 8px; object-fit: cover;">
                            <div>
                                <div style="font-weight: 600;">${l.title}</div>
                                <div style="font-size: 0.75rem; color: var(--text-gray);">${l.amenities.slice(0, 2).join(', ')}</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div style="font-weight: 600; color: var(--primary);">₹${l.price}</div>
                        <div style="font-size: 0.75rem; color: var(--text-gray);">Dep: ₹${l.deposit}</div>
                    </td>
                    <td>${l.lat.toFixed(3)}, ${l.lon.toFixed(3)}</td>
                    <td>
                        <span class="status-badge ${l.is_approved ? 'status-approved' : 'status-pending'}">
                            ${l.is_approved ? 'Approved' : 'Pending'}
                        </span>
                    </td>
                    <td>${new Date(l.created_at || Date.now()).toLocaleDateString()}</td>
                    <td class="actions">
                        ${!l.is_approved ? `<div class="btn-icon" style="color: #16a34a; border-color: #16a34a;" onclick="approveListing('${l._id}')" title="Approve"><i data-lucide="check"></i></div>` : ''}
                        ${!l.is_approved ? `<div class="btn-icon" style="color: #ef4444; border-color: #ef4444;" onclick="rejectListing('${l._id}')" title="Reject"><i data-lucide="x"></i></div>` : ''}
                        <div class="btn-icon" onclick="editListing('${l._id}')"><i data-lucide="edit-2"></i></div>
                        <div class="btn-icon btn-delete" onclick="deleteListing('${l._id}')"><i data-lucide="trash-2"></i></div>
                    </td>
                `;
                body.appendChild(tr);
            });
            lucide.createIcons();
        }

        function openModal() { document.getElementById('flat-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('flat-modal').style.display = 'none'; }

        function previewImages() {
            const grid = document.getElementById('preview-grid');
            const files = document.getElementById('image-input').files;
            grid.innerHTML = '';
            for(let file of files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const div = document.createElement('div');
                    div.className = 'preview-box';
                    div.innerHTML = `<img src="${e.target.result}">`;
                    grid.appendChild(div);
                }
                reader.readAsDataURL(file);
            }
        }

        document.getElementById('flat-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            btn.innerText = 'Uploading...';
            btn.disabled = true;

            const formData = new FormData(e.target);
            try {
                const resp = await fetch('/api/listings', {
                    method: 'POST',
                    body: formData
                });
                const data = await resp.json();
                if (data.success) {
                    closeModal();
                    fetchListings();
                    e.target.reset();
                    document.getElementById('preview-grid').innerHTML = '';
                }
            } catch (err) {
                console.error(err);
            } finally {
                btn.innerText = 'Save Property Listing';
                btn.disabled = false;
            }
        };

        async function deleteListing(id) {
            if(!confirm('Are you sure you want to delete this listing?')) return;
            await fetch(`/api/listings/${id}`, { method: 'DELETE' });
            fetchListings();
        }

        async function rejectListing(id) {
            if(!confirm('Reject and delete this listing? Owner will be notified.')) return;
            const resp = await fetch(`/api/listings/${id}/reject`, { method: 'PATCH' });
            if ((await resp.json()).success) fetchListings();
        }

        async function approveListing(id) {
            const resp = await fetch(`/api/listings/${id}`, { method: 'PATCH' });
            if ((await resp.json()).success) fetchListings();
        }

        function editListing(id) {
            alert('Edit functionality coming soon! ID: ' + id);
        }

        fetchListings();
    </script>
</body>
</html>
